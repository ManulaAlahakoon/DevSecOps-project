name: CI

on: [push]

jobs:
  sast_scan:
    name: Run Bandit Scan
    runs-on: ubuntu-latest

    steps:
    - name: checkout code
      uses: actions/checkout@v6.0.2

    - name: Setup Python
      uses: actions/setup-python@v6.2.0
      with:
        python-version: 3.11

    - name: Install Bandit
      run: pip install bandit

    - name: Run Bandit Scan
      run: bandit -r -ll -ii . -f json --output bandit-scan-report.json

    - name: Upload artifact
      uses: actions/upload-artifact@v7.0.1
      if: always()
      with:
        name: Bandit scan report
        path: bandit-scan-report.json
